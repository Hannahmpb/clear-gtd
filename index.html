<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Clear · Getting Things Done</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Clear">
<meta name="theme-color" content="#f6f5f1">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<style>
:root{
  --bg:#f6f5f1; --card:#ffffff; --ink:#22211e; --ink2:#75736c; --ink3:#a8a69e;
  --line:#e8e6e0; --accent:#0e7a6f; --accent-soft:#e2f0ee;
  --amber:#b45309; --amber-soft:#fdf0e0; --violet:#6d5bb8; --violet-soft:#edeafa;
  --blue:#2563ab; --blue-soft:#e4edf8; --red:#b3402f; --red-soft:#fae7e3;
  --shadow:0 1px 3px rgba(30,28,20,.06),0 6px 24px rgba(30,28,20,.05);
  --r:16px; --nav-h:64px;
}
@media (prefers-color-scheme: dark){
  :root{ --bg:#161614; --card:#222220; --ink:#eceae4; --ink2:#a5a39b; --ink3:#6e6c65;
  --line:#33322e; --accent:#3aa99a; --accent-soft:#1e3532; --amber:#d98e3d; --amber-soft:#3a2c1a;
  --violet:#a493e8; --violet-soft:#2b2741; --blue:#6ea4dd; --blue-soft:#1d2a3a;
  --red:#d97462; --red-soft:#3a221d; --shadow:0 1px 3px rgba(0,0,0,.3); }
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg); color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif;
  font-size:16px; line-height:1.45;
  padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom));
  overscroll-behavior-y:none;
}
button{font:inherit;color:inherit;background:none;border:none;padding:0;cursor:pointer;}
input,textarea,select{font:inherit;color:var(--ink);}
.app{max-width:640px;margin:0 auto;padding:0 16px;}
@media(min-width:900px){ .app{max-width:720px;} }

/* header */
.hdr{display:flex;align-items:center;justify-content:space-between;
  padding:calc(10px + env(safe-area-inset-top)) 2px 6px;}
.hdr h1{font-size:22px;font-weight:700;margin:0;letter-spacing:-.02em;}
.hdr .sub{font-size:12.5px;color:var(--ink2);margin-top:1px;}
.hdr-btns{display:flex;gap:6px;align-items:center;}
.icon-btn{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;color:var(--ink2);}
.icon-btn:active{background:var(--line);}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--ink3);}
.sync-dot.ok{background:var(--accent);} .sync-dot.err{background:var(--red);} .sync-dot.busy{background:var(--amber);animation:pulse 1s infinite;}
@keyframes pulse{50%{opacity:.35;}}

/* capture */
.capture{display:flex;gap:8px;margin:6px 0 14px;}
.capture input{flex:1;border:1px solid var(--line);background:var(--card);border-radius:14px;
  padding:13px 16px;font-size:16px;box-shadow:var(--shadow);outline:none;}
.capture input::placeholder{color:var(--ink3);}
.capture input:focus{border-color:var(--accent);}
.capture .go{background:var(--accent);color:#fff;border-radius:14px;width:48px;flex:none;
  display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:600;box-shadow:var(--shadow);}
.capture .go:active{transform:scale(.95);}

/* view heading */
.vhead{display:flex;align-items:baseline;justify-content:space-between;margin:4px 2px 10px;}
.vhead h2{font-size:19px;font-weight:700;margin:0;letter-spacing:-.01em;}
.vhead .count{font-size:13px;color:var(--ink2);}
.vdesc{font-size:13.5px;color:var(--ink2);margin:-6px 2px 12px;}

/* cards & items */
.card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);margin-bottom:10px;overflow:hidden;}
.item{display:flex;align-items:flex-start;gap:11px;padding:13px 14px;border-bottom:1px solid var(--line);}
.item:last-child{border-bottom:none;}
.item:active{background:var(--bg);}
.item .tick{width:24px;height:24px;flex:none;margin-top:1px;border-radius:50%;
  border:1.8px solid var(--ink3);display:flex;align-items:center;justify-content:center;color:transparent;}
.item .tick:active{border-color:var(--accent);color:var(--accent);}
.item.done-anim .tick{background:var(--accent);border-color:var(--accent);color:#fff;}
.item .body{flex:1;min-width:0;}
.item .title{font-size:15.5px;word-wrap:break-word;}
.item.done-anim .title{text-decoration:line-through;color:var(--ink3);}
.item .meta{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px;}
.chip{font-size:11.5px;padding:2px 8px;border-radius:99px;background:var(--accent-soft);color:var(--accent);font-weight:600;}
.chip.ctx{background:var(--blue-soft);color:var(--blue);}
.chip.proj{background:var(--violet-soft);color:var(--violet);}
.chip.who{background:var(--amber-soft);color:var(--amber);}
.chip.date{background:var(--line);color:var(--ink2);}
.chip.date.overdue{background:var(--red-soft);color:var(--red);}
.chip.stalled{background:var(--red-soft);color:var(--red);}
.item .note-preview{font-size:13px;color:var(--ink2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.item .age{font-size:11.5px;color:var(--ink3);margin-top:3px;}

/* empty state */
.empty{text-align:center;padding:44px 20px;color:var(--ink2);}
.empty .big{font-size:34px;margin-bottom:8px;}
.empty .t{font-weight:600;color:var(--ink);margin-bottom:4px;}
.empty .d{font-size:13.5px;max-width:300px;margin:0 auto;}

/* context filter chips */
.filterbar{display:flex;gap:7px;overflow-x:auto;padding:2px 2px 12px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.filterbar::-webkit-scrollbar{display:none;}
.fchip{flex:none;font-size:13px;font-weight:600;padding:7px 14px;border-radius:99px;
  background:var(--card);color:var(--ink2);border:1px solid var(--line);box-shadow:var(--shadow);}
.fchip.on{background:var(--ink);color:var(--bg);border-color:var(--ink);}

/* group label */
.glabel{font-size:12.5px;font-weight:700;color:var(--ink2);text-transform:uppercase;letter-spacing:.06em;margin:16px 2px 8px;}
.glabel:first-child{margin-top:2px;}

/* bottom nav */
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--line);
  display:flex;justify-content:space-around;padding:6px 8px calc(6px + env(safe-area-inset-bottom));z-index:40;}
.nav button{flex:1;max-width:110px;display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:5px 0;color:var(--ink3);font-size:10.5px;font-weight:600;border-radius:12px;position:relative;}
.nav button.on{color:var(--accent);}
.nav svg{width:23px;height:23px;}
.nav .badge{position:absolute;top:0;left:calc(50% + 6px);background:var(--red);color:#fff;
  font-size:10px;font-weight:700;min-width:17px;height:17px;border-radius:99px;
  display:flex;align-items:center;justify-content:center;padding:0 4px;}

/* sheets / modals */
.overlay{position:fixed;inset:0;background:rgba(20,18,14,.42);z-index:50;display:flex;
  align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .18s;}
.overlay.show{opacity:1;pointer-events:auto;}
@media(min-width:640px){ .overlay{align-items:center;} }
.sheet{background:var(--card);width:100%;max-width:560px;border-radius:22px 22px 0 0;
  padding:8px 20px calc(20px + env(safe-area-inset-bottom));max-height:88vh;overflow-y:auto;
  transform:translateY(30px);transition:transform .18s;}
.overlay.show .sheet{transform:none;}
@media(min-width:640px){ .sheet{border-radius:22px;padding-bottom:22px;} }
.sheet .grab{width:36px;height:4px;border-radius:2px;background:var(--line);margin:6px auto 14px;}
.sheet h3{font-size:18px;font-weight:700;margin:0 0 4px;letter-spacing:-.01em;}
.sheet .q-item{font-size:14px;color:var(--ink2);background:var(--bg);border-radius:12px;
  padding:10px 14px;margin:10px 0 16px;word-wrap:break-word;}
.sheet .q{font-size:16.5px;font-weight:700;margin:14px 0 4px;}
.sheet .qd{font-size:13.5px;color:var(--ink2);margin-bottom:14px;}

/* option buttons in clarify */
.opts{display:flex;flex-direction:column;gap:9px;}
.opt{display:flex;align-items:center;gap:12px;text-align:left;background:var(--bg);
  border:1px solid var(--line);border-radius:14px;padding:13px 15px;}
.opt:active{background:var(--line);}
.opt .ic{width:36px;height:36px;flex:none;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:17px;}
.opt b{display:block;font-size:15px;}
.opt span{display:block;font-size:12.5px;color:var(--ink2);margin-top:1px;}
.opt.teal .ic{background:var(--accent-soft);} .opt.amber .ic{background:var(--amber-soft);}
.opt.violet .ic{background:var(--violet-soft);} .opt.blue .ic{background:var(--blue-soft);}
.opt.red .ic{background:var(--red-soft);} .opt.plain .ic{background:var(--line);}
.backlink{font-size:14px;font-weight:600;color:var(--ink2);margin-top:14px;display:inline-block;}

/* forms */
.frow{margin-bottom:13px;}
.frow label{display:block;font-size:12.5px;font-weight:700;color:var(--ink2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em;}
.frow input[type=text],.frow input[type=date],.frow textarea,.frow select{
  width:100%;border:1px solid var(--line);background:var(--bg);border-radius:12px;padding:11px 13px;font-size:15.5px;outline:none;}
.frow textarea{min-height:74px;resize:vertical;}
.frow input:focus,.frow textarea:focus,.frow select:focus{border-color:var(--accent);}
.ctx-pick{display:flex;flex-wrap:wrap;gap:7px;}
.ctx-pick .fchip{box-shadow:none;}
.btn{display:block;width:100%;text-align:center;background:var(--accent);color:#fff;font-weight:700;
  font-size:15.5px;padding:13px;border-radius:14px;margin-top:6px;}
.btn:active{opacity:.85;}
.btn.ghost{background:var(--bg);color:var(--ink);border:1px solid var(--line);}
.btn.danger{background:var(--red-soft);color:var(--red);}
.btnrow{display:flex;gap:9px;margin-top:6px;}
.btnrow .btn{margin-top:0;}

/* timer */
.timer-wrap{text-align:center;padding:10px 0 6px;}
.timer-num{font-size:56px;font-weight:800;letter-spacing:-.03em;font-variant-numeric:tabular-nums;}
.timer-note{color:var(--ink2);font-size:13.5px;margin-bottom:16px;}

/* review */
.rev-progress{display:flex;gap:5px;margin:4px 0 18px;}
.rev-progress i{flex:1;height:4px;border-radius:2px;background:var(--line);}
.rev-progress i.on{background:var(--accent);}
.rev-step-num{font-size:12.5px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.06em;}
.rev-embed{margin:14px 0;}
.nudge{background:var(--amber-soft);color:var(--amber);border-radius:14px;padding:12px 15px;
  font-size:13.5px;font-weight:600;margin-bottom:12px;}
.review-hero{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);padding:22px 20px;text-align:center;margin-bottom:12px;}
.review-hero .big{font-size:36px;}
.review-hero h3{margin:8px 0 4px;font-size:18px;}
.review-hero p{color:var(--ink2);font-size:13.5px;margin:0 0 16px;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.stat{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);padding:14px;text-align:center;}
.stat .n{font-size:26px;font-weight:800;letter-spacing:-.02em;}
.stat .l{font-size:12px;color:var(--ink2);font-weight:600;}

/* more menu */
.menu-list .item{align-items:center;}
.menu-list .ic{width:36px;height:36px;flex:none;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:17px;background:var(--bg);}
.menu-list .cnt{color:var(--ink3);font-size:14px;font-weight:600;}

/* settings */
.set-note{font-size:13px;color:var(--ink2);margin:6px 0 14px;}
.toast{position:fixed;left:50%;bottom:calc(var(--nav-h) + 18px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(8px);
  background:var(--ink);color:var(--bg);font-size:14px;font-weight:600;padding:10px 18px;border-radius:99px;
  opacity:0;pointer-events:none;transition:.22s;z-index:99;white-space:nowrap;box-shadow:var(--shadow);
  display:flex;align-items:center;gap:4px;}
.toast.show{opacity:1;pointer-events:auto;transform:translateX(-50%);}
.toast .undo{color:#6fd3c4;font-weight:800;padding:2px 6px 2px 10px;border-left:1px solid rgba(128,128,128,.4);margin-left:8px;}
.sheet{position:relative;}
.sheet .x{position:absolute;top:16px;right:16px;width:32px;height:32px;border-radius:50%;
  background:var(--bg);color:var(--ink2);font-size:15px;display:flex;align-items:center;justify-content:center;z-index:2;}
.item.sub{padding-left:36px;}
.pdot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:7px;vertical-align:baseline;}
.hidden{display:none!important;}
a{color:var(--accent);}
</style>
</head>
<body>
<div class="app">
  <header class="hdr">
    <div>
      <h1 id="hdr-title">Clear</h1>
      <div class="sub" id="hdr-sub"></div>
    </div>
    <div class="hdr-btns">
      <div class="sync-dot" id="sync-dot" title="Sync status"></div>
      <button class="icon-btn" id="btn-settings" aria-label="Settings">
        <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="3.2"/><path d="M19.4 15a1.6 1.6 0 0 0 .32 1.76l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.6 1.6 0 0 0-1.76-.32 1.6 1.6 0 0 0-.97 1.47V21a2 2 0 1 1-4 0v-.09a1.6 1.6 0 0 0-1.05-1.47 1.6 1.6 0 0 0-1.76.32l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.6 1.6 0 0 0 .32-1.76 1.6 1.6 0 0 0-1.47-.97H3a2 2 0 1 1 0-4h.09a1.6 1.6 0 0 0 1.47-1.05 1.6 1.6 0 0 0-.32-1.76l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.6 1.6 0 0 0 1.76.32h.09a1.6 1.6 0 0 0 .97-1.47V3a2 2 0 1 1 4 0v.09a1.6 1.6 0 0 0 .97 1.47 1.6 1.6 0 0 0 1.76-.32l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.6 1.6 0 0 0-.32 1.76v.09a1.6 1.6 0 0 0 1.47.97H21a2 2 0 1 1 0 4h-.09a1.6 1.6 0 0 0-1.47.97z"/></svg>
      </button>
    </div>
  </header>

  <div class="capture" id="capture-bar">
    <input type="text" id="capture-input" placeholder="What's on your mind?" autocomplete="off" enterkeyhint="done">
    <button class="go" id="capture-go" aria-label="Capture">+</button>
  </div>

  <main id="main"></main>
</div>

<nav class="nav" id="nav"></nav>

<div class="overlay" id="overlay"><div class="sheet" id="sheet"><div class="grab"></div><button class="x" id="sheet-x" aria-label="Close">✕</button><div id="sheet-body"></div></div></div>
<div class="toast" id="toast"></div>

<script>
"use strict";
/* ============ STATE & STORAGE ============ */
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
const now = () => new Date().toISOString();
const todayStr = () => { const d = new Date(); return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0"); };

let items = [];   // {id,title,note,list,context,project,who,date,created,updated,completedAt,deleted}
let meta = {
  contexts: ["@calls","@computer","@errands","@home","@work","@agendas","@read-review","@anywhere"],
  lastReview: null,
  sync: { url: "", key: "", lastPull: null },
  ctxFilter: null
};
let view = "inbox";
let dirty = new Set(); // ids changed since last push

function load() {
  try { items = JSON.parse(localStorage.getItem("gtd.items") || "[]"); } catch(e){ items = []; }
  try { const m = JSON.parse(localStorage.getItem("gtd.meta") || "{}"); meta = Object.assign(meta, m); } catch(e){}
  try { dirty = new Set(JSON.parse(localStorage.getItem("gtd.dirty") || "[]")); } catch(e){}
}
function save() {
  localStorage.setItem("gtd.items", JSON.stringify(items));
  localStorage.setItem("gtd.meta", JSON.stringify(meta));
  localStorage.setItem("gtd.dirty", JSON.stringify([...dirty]));
}
function touch(it) { it.updated = now(); dirty.add(it.id); save(); scheduleSync(); }
function byId(id) { return items.find(i => i.id === id); }
function live() { return items.filter(i => !i.deleted); }
function inList(l) { return live().filter(i => i.list === l); }

function addItem(title, list, extra) {
  const it = Object.assign({ id: uid(), title: title.trim(), note: "", list: list || "inbox",
    context: null, project: null, who: null, date: null,
    created: now(), updated: now(), completedAt: null, deleted: false }, extra || {});
  items.unshift(it); dirty.add(it.id); save(); scheduleSync();
  return it;
}
function completeItem(it) { it.list = "done"; it.completedAt = now(); touch(it); }
function trashItem(it) { it.deleted = true; touch(it); }

/* projects helpers */
function projectActions(pid) { return live().filter(i => i.project === pid && (i.list === "next" || i.list === "waiting" || i.list === "scheduled")); }
function subProjects(pid) { return live().filter(i => i.list === "project" && i.project === pid); }
function projectActionsDeep(pid) {
  let acts = projectActions(pid);
  subProjects(pid).forEach(sp => { acts = acts.concat(projectActionsDeep(sp.id)); });
  return acts;
}
function projectIsStalled(pid) { return projectActionsDeep(pid).length === 0; }
function topProjects() {
  return inList("project").filter(p => {
    if (!p.project) return true;
    const parent = byId(p.project);
    return !parent || parent.deleted || parent.list !== "project";
  });
}
function projHue(id) { let h = 0; for (const c of id) h = (h * 31 + c.charCodeAt(0)) % 360; return h; }
function projDot(id) { return `<span class="pdot" style="background:hsl(${projHue(id)},48%,52%)"></span>`; }
function projChipStyle(id) { const h = projHue(id); return `background:hsla(${h},50%,50%,.16);color:hsl(${h},45%,45%)`; }

/* dates */
function fmtDate(s) {
  if (!s) return "";
  const d = new Date(s + "T00:00:00");
  const t = new Date(); t.setHours(0,0,0,0);
  const diff = Math.round((d - t) / 86400000);
  if (diff === 0) return "Today";
  if (diff === 1) return "Tomorrow";
  if (diff === -1) return "Yesterday";
  if (diff < -1) return d.toLocaleDateString(undefined,{day:"numeric",month:"short"});
  if (diff < 7) return d.toLocaleDateString(undefined,{weekday:"short"});
  return d.toLocaleDateString(undefined,{day:"numeric",month:"short"});
}
function isOverdue(s) { return s && s < todayStr(); }
function ago(iso) {
  const days = Math.floor((Date.now() - new Date(iso)) / 86400000);
  if (days <= 0) return "today"; if (days === 1) return "1 day"; return days + " days";
}
function esc(s) { return (s || "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

/* ============ RENDERING ============ */
const $ = s => document.querySelector(s);
const main = $("#main");

const VIEWS = {
  inbox:     { title: "Inbox",        sub: "Capture everything. Then clarify." },
  next:      { title: "Next Actions", sub: "Concrete, visible next steps." },
  projects:  { title: "Projects",     sub: "Outcomes needing more than one step." },
  waiting:   { title: "Waiting For",  sub: "Delegated. Track who has it, and since when." },
  scheduled: { title: "Scheduled",    sub: "Date-specific commitments." },
  someday:   { title: "Someday / Maybe", sub: "Ideas to review, not commitments." },
  reference: { title: "Reference",    sub: "Information worth keeping. No action." },
  done:      { title: "Logbook",      sub: "Everything you've completed." },
  review:    { title: "Weekly Review", sub: "" },
  more:      { title: "Lists",        sub: "" },
  settings:  { title: "Settings",     sub: "" }
};

function setView(v) { if (view === "review" && v !== "review") reviewActive = false; view = v; render(); window.scrollTo(0, 0); }

function render() {
  renderNav();
  const cap = $("#capture-bar");
  cap.classList.toggle("hidden", ["settings","done"].includes(view) || (view === "review" && !reviewActive));
  $("#hdr-title").textContent = VIEWS[view] ? VIEWS[view].title : "Clear";
  $("#hdr-sub").textContent = VIEWS[view] ? VIEWS[view].sub : "";
  switch (view) {
    case "inbox": renderInbox(); break;
    case "next": renderNext(); break;
    case "projects": renderProjects(); break;
    case "waiting": renderSimpleList("waiting"); break;
    case "scheduled": renderScheduled(); break;
    case "someday": renderSimpleList("someday"); break;
    case "reference": renderSimpleList("reference"); break;
    case "done": renderDone(); break;
    case "review": reviewActive ? renderReviewStep() : renderReviewHome(); break;
    case "more": renderMore(); break;
    case "settings": renderSettings(); break;
  }
}

function emptyState(icon, t, d) {
  return `<div class="card"><div class="empty"><div class="big">${icon}</div><div class="t">${t}</div><div class="d">${d}</div></div></div>`;
}

function itemMeta(it) {
  let m = "";
  if (it.context) m += `<span class="chip ctx">${esc(it.context)}</span>`;
  if (it.project) { const p = byId(it.project); if (p && !p.deleted) m += `<span class="chip proj" style="${projChipStyle(p.id)}">${esc(p.title)}</span>`; }
  if (it.who) m += `<span class="chip who">${esc(it.who)}</span>`;
  if (it.date) m += `<span class="chip date ${isOverdue(it.date) ? "overdue" : ""}">${fmtDate(it.date)}</span>`;
  return m ? `<div class="meta">${m}</div>` : "";
}

function itemRow(it, opts) {
  opts = opts || {};
  const note = it.note ? `<div class="note-preview">${esc(it.note)}</div>` : "";
  const age = opts.ageLabel ? `<div class="age">${opts.ageLabel} ${ago(it.created)}</div>` : "";
  const tick = opts.noTick ? "" :
    `<button class="tick" data-act="done" data-id="${it.id}" aria-label="Complete">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    </button>`;
  return `<div class="item" data-id="${it.id}">${tick}
    <div class="body" data-act="${opts.tapAction || "edit"}" data-id="${it.id}">
      <div class="title">${esc(it.title)}</div>${note}${itemMeta(it)}${age}
    </div></div>`;
}

function projectRow(p, isSub) {
  const acts = projectActionsDeep(p.id);
  const stalled = acts.length === 0;
  return `<div class="item ${isSub ? "sub" : ""}" data-id="${p.id}">
    <div class="body" data-act="project" data-id="${p.id}">
      <div class="title">${isSub ? '<span style="color:var(--ink3)">↳ </span>' : ""}${projDot(p.id)}${esc(p.title)}</div>
      ${p.note ? `<div class="note-preview">${esc(p.note)}</div>` : ""}
      <div class="meta">
        ${stalled ? `<span class="chip stalled">⚠ no next action</span>` : `<span class="chip">${acts.length} action${acts.length>1?"s":""}</span>`}
      </div>
    </div></div>`;
}
function renderProjects() {
  const list = inList("project");
  if (!list.length) {
    main.innerHTML = emptyState("🎯", "No projects yet", "A project is any outcome needing more than one action step. They'll appear here when you clarify inbox items into projects.")
      + `<button class="btn ghost" data-act="new-project">+ New project</button>`;
    return;
  }
  const rows = topProjects().map(p =>
    projectRow(p, false) + subProjects(p.id).map(sp => projectRow(sp, true)).join("")
  ).join("");
  const stalledCount = topProjects().filter(p => projectIsStalled(p.id)).length;
  main.innerHTML =
    (stalledCount ? `<div class="nudge">⚠ ${stalledCount} project${stalledCount>1?"s have":" has"} no next action. A project without a next action is stuck.</div>` : "") +

function renderScheduled() {
  const list = inList("scheduled").slice().sort((a,b) => (a.date||"9999") < (b.date||"9999") ? -1 : 1);
  if (!list.length) { main.innerHTML = emptyState("🗓", "Nothing scheduled", "Items with a hard date land here: day-specific actions and reminders."); return; }

/* ============ SHEET / TOAST ============ */
const overlay = $("#overlay"), sheetBody = $("#sheet-body");
let onSheetClose = null, sheetDirty = false;
function openSheet(html, closeCb) { sheetBody.innerHTML = html; onSheetClose = closeCb || null; sheetDirty = false; overlay.classList.add("show"); }
function closeSheet() {
  overlay.classList.remove("show"); sheetDirty = false;
  if (onSheetClose) { const cb = onSheetClose; onSheetClose = null; cb(); }
  stopTimer();
}
sheetBody.addEventListener("input", () => { sheetDirty = true; });
overlay.addEventListener("click", e => {
  if (e.target !== overlay) return;
  if (sheetDirty) { toast("You have unsaved changes. Save, or close with ✕"); return; }
  closeSheet();
});
$("#sheet-x").addEventListener("click", closeSheet);
let toastT = null;
function toast(msg) {
  const t = $("#toast"); t.textContent = msg; t.classList.add("show");
  clearTimeout(toastT); toastT = setTimeout(() => t.classList.remove("show"), 2400);
}
/* undo: snapshot items before a move/complete/delete, restore on tap */
let undoData = null;
const snap = it => JSON.parse(JSON.stringify(it));
function toastUndo(msg, restoreSnaps, removeIds) {
  undoData = { restore: restoreSnaps || [], removeIds: removeIds || [] };
  const t = $("#toast");
  t.innerHTML = `<span>${esc(msg)}</span><button class="undo" data-act="undo">Undo</button>`;
  t.classList.add("show");
  clearTimeout(toastT); toastT = setTimeout(() => t.classList.remove("show"), 6000);
}
function doUndo() {
  if (!undoData) return;
  undoData.restore.forEach(s => {
    s.updated = now();
    const li = byId(s.id);
    if (li) Object.assign(li, s); else items.push(s);
    dirty.add(s.id);
  });
  undoData.removeIds.forEach(id => { const li = byId(id); if (li) { li.deleted = true; li.updated = now(); dirty.add(id); } });
  undoData = null; save(); scheduleSync(); render();
  $("#toast").classList.remove("show");
}

/* ============ CLARIFY WIZARD ============ */
let clarifyQueue = [];
function startClarify(id, queue) {
  clarifyQueue = queue || [];
  clarifyStep(id, "start");
}
function clarifyNextInQueue() {
  const nxt = clarifyQueue.shift();
  if (nxt && byId(nxt) && !byId(nxt).deleted && byId(nxt).list === "inbox") clarifyStep(nxt, "start");
  else { closeSheet(); render(); }
}
function clarifyStep(id, step) {
  const it = byId(id); if (!it) { closeSheet(); return; }
  const head = `<h3>Clarify</h3><div class="q-item">${esc(it.title)}</div>`;
  let html = "";
  if (step === "start") {
    html = head + `<div class="q">Is it actionable?</div>
      <div class="qd">Does something need to happen about this?</div>
      <div class="opts">
        <button class="opt teal" data-cl="actionable" data-id="${id}"><div class="ic">⚡️</div><div><b>Yes, something to do</b><span>It requires action from you or someone else</span></div></button>
        <button class="opt violet" data-cl="someday" data-id="${id}"><div class="ic">🌱</div><div><b>Someday / maybe</b><span>Not now. Park it for review later</span></div></button>
        <button class="opt blue" data-cl="reference" data-id="${id}"><div class="ic">📚</div><div><b>Reference</b><span>Just information worth keeping</span></div></button>
        <button class="opt red" data-cl="trash" data-id="${id}"><div class="ic">🗑</div><div><b>Trash</b><span>Needs nothing. Let it go</span></div></button>
      </div>`;
  } else if (step === "actionable") {
    html = head + `<div class="q">What kind of action?</div>
      <div class="qd">If it takes more than one step, it's a project.</div>
      <div class="opts">
        <button class="opt teal" data-cl="twomin" data-id="${id}"><div class="ic">⏱</div><div><b>Under 2 minutes: do it now</b><span>Doing it beats tracking it</span></div></button>
        <button class="opt blue" data-cl="defer" data-id="${id}"><div class="ic">➡️</div><div><b>Single next action</b><span>One step, done by you, when you can</span></div></button>
        <button class="opt violet" data-cl="project" data-id="${id}"><div class="ic">🎯</div><div><b>It's a project</b><span>Multiple steps toward an outcome</span></div></button>
        <button class="opt amber" data-cl="delegate" data-id="${id}"><div class="ic">📮</div><div><b>Delegate it</b><span>Someone else should do this</span></div></button>
        <button class="opt plain" data-cl="schedule" data-id="${id}"><div class="ic">🗓</div><div><b>Schedule it</b><span>Must happen on a specific day</span></div></button>
      </div>
      <button class="backlink" data-cl="start" data-id="${id}">← Back</button>`;
  } else if (step === "twomin") {
    html = head + `<div class="timer-wrap">
        <div class="timer-num" id="timer-num">2:00</div>
        <div class="timer-note">If it takes less than two minutes, do it now. It takes longer to track than to do.</div>
        <button class="btn" data-cl="twomin-done" data-id="${id}">Done ✓</button>
        <button class="btn ghost" data-cl="actionable" data-id="${id}">It's bigger than I thought</button>
      </div>`;
  } else if (step === "defer") {
    html = head + `<div class="q">Define the next action</div>
      <div class="qd">Make it a visible, physical action: "Call", "Draft", "Buy", not "sort out".</div>
      <div class="frow"><label>Next action</label><input type="text" id="cl-title" value="${esc(it.title)}"></div>
      <div class="frow"><label>Context: where can you do it?</label><div class="ctx-pick" id="cl-ctx">${meta.contexts.map(c => `<button class="fchip" data-ctxval="${esc(c)}">${esc(c)}</button>`).join("")}</div></div>
      <div class="frow"><label>Notes (optional)</label><textarea id="cl-note" placeholder="Details, links, sub-steps…">${esc(it.note)}</textarea></div>
      <div class="frow"><label>Due date (optional)</label><input type="date" id="cl-date"></div>
      <button class="btn" data-cl="defer-save" data-id="${id}">Add to Next Actions</button>
      <button class="backlink" data-cl="actionable" data-id="${id}">← Back</button>`;
  } else if (step === "project") {
    html = head + `<div class="q">Name the project outcome</div>
      <div class="qd">Describe what "done" looks like, then decide the very next physical action.</div>
      <div class="frow"><label>Project (desired outcome)</label><input type="text" id="cl-title" value="${esc(it.title)}"></div>
      <div class="frow"><label>Notes (optional)</label><textarea id="cl-note" placeholder="Why it matters, ideas, sub-steps…">${esc(it.note)}</textarea></div>
      <div class="frow"><label>Very next action</label><input type="text" id="cl-na" placeholder="e.g. Email Sam to get the budget"></div>
      <div class="frow"><label>Context for that action</label><div class="ctx-pick" id="cl-ctx">${meta.contexts.map(c => `<button class="fchip" data-ctxval="${esc(c)}">${esc(c)}</button>`).join("")}</div></div>
      <button class="btn" data-cl="project-save" data-id="${id}">Create project</button>
      <button class="backlink" data-cl="actionable" data-id="${id}">← Back</button>`;
  } else if (step === "delegate") {
    html = head + `<div class="q">Who's got it?</div>
      <div class="qd">It moves to Waiting For, tracked from today.</div>

      <button class="btn" data-cl="delegate-save" data-id="${id}">Move to Waiting For</button>

      <div class="frow"><label>Notes (optional)</label><textarea id="cl-note">${esc(it.note)}</textarea></div>
      <button class="btn" data-cl="schedule-save" data-id="${id}">Schedule it</button>
      <button class="backlink" data-cl="actionable" data-id="${id}">← Back</button>`;
  }
  openSheet(html);
  if (step === "twomin") startTimer();
}

/* clarify actions */
let pickedCtx = null;
document.addEventListener("click", e => {
  const ctxBtn = e.target.closest("[data-ctxval]");
  if (ctxBtn) {
    pickedCtx = ctxBtn.dataset.ctxval;
    ctxBtn.parentElement.querySelectorAll(".fchip").forEach(b => b.classList.toggle("on", b === ctxBtn));
    return;
  }
  const cl = e.target.closest("[data-cl]");
  if (!cl) return;
  const id = cl.dataset.id, act = cl.dataset.cl, it = byId(id);
  if (!it) return;
  const val = sel => { const el = $(sel); return el ? el.value.trim() : ""; };
  switch (act) {
    case "start": case "actionable": pickedCtx = null; clarifyStep(id, act); break;
    case "twomin": clarifyStep(id, "twomin"); break;
    case "defer": case "project": case "delegate": case "schedule": pickedCtx = null; clarifyStep(id, act); break;
    case "someday": { const s = snap(it); it.list = "someday"; touch(it); toastUndo("Parked in Someday/Maybe", [s]); clarifyNextInQueue(); break; }
    case "reference": { const s = snap(it); it.list = "reference"; touch(it); toastUndo("Filed as Reference", [s]); clarifyNextInQueue(); break; }
    case "trash": { const s = snap(it); trashItem(it); toastUndo("Let go 🗑", [s]); clarifyNextInQueue(); break; }
    case "twomin-done": { const s = snap(it); completeItem(it); toastUndo("Done. That's the 2-minute rule ⚡️", [s]); stopTimer(); clarifyNextInQueue(); break; }
    case "defer-save": {
      const s = snap(it);
      it.title = val("#cl-title") || it.title; it.list = "next"; it.context = pickedCtx;
      it.note = val("#cl-note"); it.date = val("#cl-date") || null;
      touch(it); toastUndo("Added to Next Actions", [s]); clarifyNextInQueue(); break;
    }
    case "project-save": {
      const s = snap(it);
      it.title = val("#cl-title") || it.title; it.list = "project"; it.note = val("#cl-note"); touch(it);
      const na = val("#cl-na");
      let created = [];
      if (na) created.push(addItem(na, "next", { context: pickedCtx, project: it.id }).id);
      toastUndo("Project created" + (na ? " with next action" : ""), [s], created);
      clarifyNextInQueue(); break;
    }
    case "delegate-save": {
      const s = snap(it);
      it.title = val("#cl-title") || it.title; it.list = "waiting"; it.who = val("#cl-who") || null;
      it.note = val("#cl-note"); it.date = null;
      it.created = now(); touch(it); toastUndo("Tracking in Waiting For", [s]); clarifyNextInQueue(); break;
    }
    case "schedule-save": {
      const s = snap(it);
      it.title = val("#cl-title") || it.title; it.list = "scheduled"; it.date = val("#cl-date") || todayStr();
      it.note = val("#cl-note");
      touch(it); toastUndo("Scheduled", [s]); clarifyNextInQueue(); break;
    }
  }
});

/* 2-min timer */
let timerInt = null;
function startTimer() {
  stopTimer();
  let s = 120;
  const el = () => document.getElementById("timer-num");
  timerInt = setInterval(() => {
    s--;
    const e2 = el(); if (!e2) { stopTimer(); return; }
    if (s <= 0) { e2.textContent = "0:00"; e2.style.color = "var(--red)"; stopTimer(); return; }
    e2.textContent = Math.floor(s/60) + ":" + String(s%60).padStart(2,"0");
  }, 1000);
}
function stopTimer() { if (timerInt) { clearInterval(timerInt); timerInt = null; } }

    ${projects.length ? `<div class="frow"><label>${it.list === "project" ? "Parent project (makes this a sub-project)" : "Project"}</label><select id="ed-proj"><option value="">None</option>${projects.map(p => `<option value="${p.id}" ${it.project===p.id?"selected":""}>${esc(p.title)}</option>`).join("")}</select></div>` : ""}
    <div class="frow"><label>Waiting on (who)</label><input type="text" id="ed-who" value="${esc(it.who||"")}"></div>
    <div class="frow"><label>Date</label><input type="date" id="ed-date" value="${it.date||""}"></div>
    <button class="btn" data-ed="save" data-id="${id}">Save</button>
    <div class="btnrow">
      ${it.list !== "done" ? `<button class="btn ghost" data-ed="complete" data-id="${id}">Complete ✓</button>` : ""}
      <button class="btn danger" data-ed="delete" data-id="${id}">Delete</button>
    </div>`);
}
document.addEventListener("click", e => {
  const b = e.target.closest("[data-ed]");
  if (!b) return;
  const it = byId(b.dataset.id); if (!it) return;
  if (b.dataset.ed === "save") {
    it.title = $("#ed-title").value.trim() || it.title;
    it.note = $("#ed-note").value.trim();
    it.list = $("#ed-list").value;
    it.context = $("#ed-ctx").value || null;
    const pj = $("#ed-proj"); it.project = pj ? (pj.value || null) : it.project;
    it.who = $("#ed-who").value.trim() || null;
    it.date = $("#ed-date").value || null;
    touch(it); closeSheet(); render(); toast("Saved");
  } else if (b.dataset.ed === "complete") {
    const s = snap(it); completeItem(it); closeSheet(); render(); toastUndo("Done ✓ (find it in the Logbook)", [s]);
  } else if (b.dataset.ed === "delete") {
    const s = snap(it); trashItem(it); closeSheet(); render(); toastUndo("Deleted", [s]);
  }
});

/* ============ PROJECT DETAIL ============ */
function openProject(id) {
  const p = byId(id); if (!p) return;
  const acts = projectActions(id);
  const subs = subProjects(id);
  const parent = p.project ? byId(p.project) : null;
  const doneActs = live().filter(i => i.project === id && i.list === "done");
  openSheet(`
    <h3>${projDot(id)}${esc(p.title)}</h3>
    ${parent && !parent.deleted ? `<div class="vdesc" style="margin:2px 0 0">↰ part of <b>${esc(parent.title)}</b></div>` : ""}
    ${p.note ? `<div class="q-item">${esc(p.note)}</div>` : ""}
    ${projectIsStalled(id) ? `<div class="nudge" style="margin-top:10px">⚠ No next action. What's the very next physical step?</div>` : ""}
    ${subs.length ? `<div class="glabel">Sub-projects</div><div class="card">${subs.map(sp => `<div class="item"><div class="body" data-act="project" data-id="${sp.id}"><div class="title">${projDot(sp.id)}${esc(sp.title)}</div><div class="meta">${projectIsStalled(sp.id) ? `<span class="chip stalled">⚠ no next action</span>` : `<span class="chip">${projectActionsDeep(sp.id).length} actions</span>`}</div></div></div>`).join("")}</div>` : ""}
    <div class="glabel">Actions</div>
    ${acts.length ? `<div class="card">${acts.map(i => itemRow(i)).join("")}</div>` : `<div class="vdesc">None yet.</div>`}
    <div class="frow" style="margin-top:6px"><input type="text" id="pj-na" placeholder="Add next action…" style="width:100%;border:1px solid var(--line);background:var(--bg);border-radius:12px;padding:11px 13px;"></div>
    <button class="btn" data-pj="add" data-id="${id}">Add action</button>
    ${doneActs.length ? `<div class="glabel">Completed (${doneActs.length})</div>` : ""}
    <div class="btnrow">
      <button class="btn ghost" data-pj="edit" data-id="${id}">Edit project</button>
      <button class="btn ghost" data-pj="complete" data-id="${id}">Complete 🎉</button>
    </div>`, () => render());
}
document.addEventListener("click", e => {
  const b = e.target.closest("[data-pj]");
  if (!b) return;
  const id = b.dataset.id, p = byId(id);
  if (b.dataset.pj === "add") {
    const v = $("#pj-na").value.trim();
    if (v) { addItem(v, "next", { project: id }); openProject(id); toast("Action added"); }
  } else if (b.dataset.pj === "edit") { openEdit(id); }
  else if (b.dataset.pj === "complete") {
    completeItem(p);
    projectActions(id).forEach(a => { a.project = null; touch(a); });
    closeSheet(); render(); toast("Project complete 🎉");
  }
});
function newProject() {
  const it = addItem("New project", "project");
  openEdit(it.id);
}

/* ============ WEEKLY REVIEW ============ */
const REVIEW_STEPS = [
  { t: "Get clear: capture loose ends", d: "Scan your life: notes, receipts, your head. Anything nagging you? Capture it now with the box at the top of the screen. Empty your head completely.", capture: true },
  { t: "Get your inbox to zero", d: "Clarify every inbox item: what is it, is it actionable, what's the next action? Tap each one.", embed: "inbox" },
  { t: "Review Next Actions", d: "Tick off anything already done. Do these still feel current and doable? Tap any item to update it.", embed: "next" },
  { t: "Review Waiting For", d: "Anything you should chase up? Anything that arrived? Tick off what's resolved.", embed: "waiting" },
  { t: "Review Scheduled", d: "Look at overdue and upcoming date-specific items. Reschedule or tick off as needed.", embed: "scheduled" },
  { t: "Review every project", d: "Does each project have a next action? Stalled projects are flagged. Tap one to add its next step.", embed: "projects" },
  { t: "Review Someday / Maybe", d: "Anything ready to activate? Tap it and move it to Next Actions. Anything to let go of?", embed: "someday" },
  { t: "Reflect", d: "How is the week looking? Any wins to notice? And did anything about this system feel clunky? Jot it here. Your note is saved to Reference, and you can share it with Claude to improve the app.", reflect: true }
];
let revIdx = 0, reviewActive = false;
function renderReviewHome() {
  const days = meta.lastReview ? Math.floor((Date.now() - new Date(meta.lastReview)) / 86400000) : null;
  const stalled = inList("project").filter(p => projectIsStalled(p.id)).length;
  main.innerHTML = `
    <div class="review-hero">
      <div class="big">🪞</div>
      <h3>Weekly Review</h3>
      <p>${days === null ? "You haven't done a review yet. This is the habit that makes the whole system trustworthy." :
          days === 0 ? "Reviewed today. Mind like water." :
          `Last review: ${days} day${days>1?"s":""} ago.` + (days > 7 ? " Time to get current." : "")}</p>
      <button class="btn" data-act="start-review">Start review · ~10 min</button>
    </div>
    <div class="stat-grid">
      <div class="stat"><div class="n">${inList("inbox").length}</div><div class="l">in inbox</div></div>
      <div class="stat"><div class="n">${inList("next").length}</div><div class="l">next actions</div></div>
      <div class="stat"><div class="n">${inList("project").length}</div><div class="l">projects${stalled ? ` · <span style="color:var(--red)">${stalled} stalled</span>` : ""}</div></div>
      <div class="stat"><div class="n">${inList("done").filter(i => i.completedAt && (Date.now() - new Date(i.completedAt)) < 7*86400000).length}</div><div class="l">done this week</div></div>
    </div>`;
}
function renderReviewStep() {
  const s = REVIEW_STEPS[revIdx];
  const prog = REVIEW_STEPS.map((_, i) => `<i class="${i <= revIdx ? "on" : ""}"></i>`).join("");
  let embed = "";
  if (s.embed) embed = `<div class="rev-embed" id="rev-embed"></div>`;
  if (s.reflect) embed = `<div class="frow" style="margin-top:14px"><textarea id="rev-reflect" style="width:100%;min-height:110px;border:1px solid var(--line);background:var(--card);border-radius:12px;padding:11px 13px;" placeholder="Wins, worries, friction with the system…"></textarea></div>`;
  main.innerHTML = `
    <div class="rev-progress">${prog}</div>
    <div class="rev-step-num">Step ${revIdx + 1} of ${REVIEW_STEPS.length}</div>
    <div class="vhead"><h2>${s.t}</h2></div>
    <div class="vdesc">${s.d}</div>
    ${embed}
    <div class="btnrow" style="margin-top:14px">
      ${revIdx > 0 ? `<button class="btn ghost" data-act="rev-prev">← Back</button>` : ""}
      <button class="btn" data-act="rev-next">${revIdx === REVIEW_STEPS.length - 1 ? "Finish ✓" : "Next →"}</button>
    </div>`;
  if (s.embed) {
    const target = $("#rev-embed");
    if (s.embed === "inbox") renderInboxInto(target);
    else if (s.embed === "next") target.innerHTML = listCard(inList("next"));
    else if (s.embed === "waiting") target.innerHTML = listCard(inList("waiting"));
    else if (s.embed === "scheduled") target.innerHTML = listCard(inList("scheduled").slice().sort((a,b)=>(a.date||"9999")<(b.date||"9999")?-1:1));
    else if (s.embed === "someday") target.innerHTML = listCard(inList("someday"));
    else if (s.embed === "projects") {
      const ps = inList("project");
      target.innerHTML = ps.length ? `<div class="card">${ps.map(p => `<div class="item"><div class="body" data-act="project" data-id="${p.id}">
        <div class="title">${esc(p.title)}</div>
        <div class="meta">${projectIsStalled(p.id) ? `<span class="chip stalled">⚠ no next action, tap to fix</span>` : `<span class="chip">${projectActions(p.id).length} actions</span>`}</div>
      </div></div>`).join("")}</div>` : `<div class="vdesc">No projects.</div>`;
    }
  }
}
function listCard(list) {
  return list.length ? `<div class="card">${list.map(i => itemRow(i)).join("")}</div>` : `<div class="vdesc" style="margin-top:8px">✓ Nothing here. Clear.</div>`;
}
function renderInboxInto(target) {
  const list = inList("inbox");
  target.innerHTML = list.length
    ? `<div class="card">${list.map(i => itemRow(i, { tapAction: "clarify", noTick: true })).join("")}</div>`
    : `<div class="vdesc" style="margin-top:8px">✓ Inbox zero. Nice.</div>`;
}

/* ============ SETTINGS ============ */
function renderSettings() {
  const s = meta.sync;
  main.innerHTML = `
    <div class="glabel">Sync (Supabase)</div>
    <div class="card" style="padding:16px 16px 6px">
      <div class="set-note">Paste the same Project URL and anon key on each device to sync. See the setup guide for the 10-minute walkthrough.</div>
      <div class="frow"><label>Project URL</label><input type="text" id="set-url" value="${esc(s.url)}" placeholder="https://xxxx.supabase.co" autocapitalize="off" autocorrect="off"></div>
      <div class="frow"><label>Anon key</label><input type="text" id="set-key" value="${esc(s.key)}" placeholder="eyJ…" autocapitalize="off" autocorrect="off"></div>
      <button class="btn" data-act="save-sync" style="margin-bottom:14px">Save & sync now</button>
    </div>
    <div class="glabel">Contexts</div>
    <div class="card" style="padding:16px 16px 6px">
      <div class="set-note">One per line. Contexts answer "where, or with what, can I do this?" The book's classics: @calls (phone calls to make), @computer, @errands (things to buy or drop off while out), @home, @work, @agendas (things to raise with a specific person when you next talk), @read-review (articles, documents). Use whichever match your life. When you only have your phone and 10 minutes, filter by @calls and just pick one.</div>
      <div class="frow"><textarea id="set-ctx" style="min-height:110px">${esc(meta.contexts.join("\n"))}</textarea></div>
      <button class="btn ghost" data-act="save-ctx" style="margin-bottom:14px">Save contexts</button>
    </div>
    <div class="glabel">Claude AI</div>
    <div class="card" style="padding:16px"><div class="set-note" style="margin:0">🤖 Coming in the next version: Claude will help clarify inbox items, split brain-dumps into actions, and summarise your weekly review.</div></div>
    <div class="glabel">Your data</div>
    <div class="card" style="padding:16px 16px 6px">
      <div class="btnrow" style="margin-bottom:14px">
        <button class="btn ghost" data-act="export">Export backup</button>
        <button class="btn ghost" data-act="import">Import</button>
      </div>
      <input type="file" id="import-file" accept=".json" class="hidden">
    </div>
    <div class="set-note" style="text-align:center;margin-top:4px">Clear · a GTD system · your data lives on this device${s.url ? " + your Supabase" : ""}</div>`;
  $("#import-file").addEventListener("change", importFile);
}
function exportData() {
  const blob = new Blob([JSON.stringify({ items, meta: { contexts: meta.contexts, lastReview: meta.lastReview } }, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "clear-gtd-backup-" + todayStr() + ".json";
  a.click();
  toast("Backup downloaded");
}
function importFile(e) {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = () => {
    try {
      const d = JSON.parse(r.result);
      if (!Array.isArray(d.items)) throw 0;
      const map = new Map(items.map(i => [i.id, i]));
      d.items.forEach(ri => {
        const li = map.get(ri.id);
        if (!li || (ri.updated || "") > (li.updated || "")) {
          if (li) Object.assign(li, ri); else items.push(ri);
          dirty.add(ri.id);
        }
      });
      if (d.meta && d.meta.contexts) meta.contexts = d.meta.contexts;
      save(); render(); toast("Imported ✓"); scheduleSync();
    } catch(err) { toast("Couldn't read that file"); }
  };
  r.readAsText(f);
}

/* ============ SUPABASE SYNC ============ */
let syncTimer = null, syncing = false;
function setDot(state) { const d = $("#sync-dot"); d.className = "sync-dot" + (state ? " " + state : ""); }
function sbHeaders() {
  return { "apikey": meta.sync.key, "Authorization": "Bearer " + meta.sync.key, "Content-Type": "application/json" };
}
function scheduleSync() {
  if (!meta.sync.url || !meta.sync.key) return;
  clearTimeout(syncTimer);
  syncTimer = setTimeout(syncNow, 1500);
}
async function syncNow() {
  if (!meta.sync.url || !meta.sync.key || syncing) return;
  syncing = true; setDot("busy");
  const base = meta.sync.url.replace(/\/+$/, "") + "/rest/v1/items";
  try {
    // push dirty
    if (dirty.size) {
      const payload = [...dirty].map(id => items.find(i => i.id === id)).filter(Boolean)
        .map(i => ({ id: i.id, data: i, updated: i.updated }));
      if (payload.length) {
        const r = await fetch(base + "?on_conflict=id", {
          method: "POST",
          headers: Object.assign(sbHeaders(), { "Prefer": "resolution=merge-duplicates" }),
          body: JSON.stringify(payload)
        });
        if (!r.ok) throw new Error("push " + r.status);
      }
      dirty.clear();
    }
    // pull
    const since = meta.sync.lastPull || "1970-01-01";
    const r2 = await fetch(base + "?select=id,data,updated&updated=gt." + encodeURIComponent(since) + "&order=updated.asc", { headers: sbHeaders() });
    if (!r2.ok) throw new Error("pull " + r2.status);
    const rows = await r2.json();
    let changed = false;
    rows.forEach(row => {
      const remote = row.data;
      const local = byId(remote.id);
      if (!local) { items.push(remote); changed = true; }
      else if ((remote.updated || "") > (local.updated || "") && !dirty.has(remote.id)) { Object.assign(local, remote); changed = true; }
      if (row.updated > (meta.sync.lastPull || "")) meta.sync.lastPull = row.updated;
    });
    save();
    if (changed) render();
    setDot("ok");
  } catch (err) {
    console.warn("sync failed", err);
    setDot("err");
  } finally { syncing = false; }
}

/* ============ GLOBAL ACTIONS ============ */
document.addEventListener("click", e => {
  const el = e.target.closest("[data-act]");
  if (!el) return;
  const act = el.dataset.act, id = el.dataset.id;
  switch (act) {
    case "goto": closeSheet(); setView(id); break;
    case "clarify": startClarify(id); break;
    case "clarify-first": {
      const q = inList("inbox").map(i => i.id);
      const first = q.shift();
      if (first) startClarify(first, q);
      break;
    }
    case "edit": openEdit(id); break;
    case "project": openProject(id); break;
    case "new-project": newProject(); break;
    case "done": {
      const it = byId(id); if (!it) break;
      const s = snap(it);
      const row = el.closest(".item");
      if (row) row.classList.add("done-anim");
      setTimeout(() => { completeItem(it); render(); toastUndo("Done ✓ (find it in the Logbook)", [s]); }, 350);
      break;
    }
    case "undo": doUndo(); break;
    case "ctx-filter": meta.ctxFilter = el.dataset.ctx || null; save(); render(); break;
    case "start-review": revIdx = 0; reviewActive = true; render(); break;
    case "rev-prev": revIdx = Math.max(0, revIdx - 1); render(); break;
    case "rev-next": {
      if (revIdx === REVIEW_STEPS.length - 1) {
        const refl = $("#rev-reflect");
        if (refl && refl.value.trim()) {
          addItem("Weekly review note · " + new Date().toLocaleDateString(undefined,{day:"numeric",month:"short"}), "reference", { note: refl.value.trim() });
        }
        meta.lastReview = now(); reviewActive = false; save(); render();
        toast("Review complete. Mind like water 🌊");
      } else { revIdx++; render(); window.scrollTo(0,0); }
      break;
    }
    case "save-sync": {
      meta.sync.url = $("#set-url").value.trim();
      meta.sync.key = $("#set-key").value.trim();
      meta.sync.lastPull = null;
      items.forEach(i => dirty.add(i.id)); // full push on (re)connect
      save();
      if (meta.sync.url && meta.sync.key) { toast("Syncing…"); syncNow(); } else { toast("Sync disabled"); setDot(""); }
      break;
    }
    case "save-ctx": {
      meta.contexts = $("#set-ctx").value.split("\n").map(s => s.trim()).filter(Boolean);
      save(); toast("Contexts saved");
      break;
    }
    case "export": exportData(); break;
    case "import": $("#import-file").click(); break;
  }
});
$("#btn-settings").addEventListener("click", () => setView("settings"));

/* ============ INIT ============ */
load();
render();
if (meta.sync.url && meta.sync.key) syncNow();
document.addEventListener("visibilitychange", () => { if (!document.hidden) { syncNow(); render(); } });
window.addEventListener("focus", () => syncNow());
if ("serviceWorker" in navigator && location.protocol.startsWith("http")) {
  navigator.serviceWorker.register("sw.js").catch(() => {});
}
/* keyboard shortcut: press / to capture (desktop) */
document.addEventListener("keydown", e => {
  if (e.key === "/" && document.activeElement.tagName !== "INPUT" && document.activeElement.tagName !== "TEXTAREA") {
    e.preventDefault(); const ci = $("#capture-input"); if (ci && !ci.closest(".hidden")) ci.focus();
  }
});
</script>
